name: Build Framework

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: macos-15

        env:
            VERSION: 1.38.1
            FRAMEWORK_NAME: EeveeSwiftProtobuf
            PACKAGE_ID: org.swift.protobuf.swiftprotobuf
            PACKAGE_NAME: SwiftProtobuf
            BUNDLE_ID: org.swift.protobuf.swiftprotobuf

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Xcode
              uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: "latest-stable"

            - name: Verify Swift toolchain
              shell: bash
              run: |
                  set -euo pipefail

                  xcodebuild -version
                  SWIFT_VERSION="$(xcrun swift -version)"
                  echo "$SWIFT_VERSION"
                  echo "$SWIFT_VERSION" | grep -E 'Swift version 6\.[2-9]'

            - name: Install Dependencies
              run: brew install dpkg ldid

            - name: Download SwiftProtobuf source
              shell: bash
              run: |
                  set -euo pipefail

                  mkdir -p build
                  curl -fsSL \
                    "https://github.com/apple/swift-protobuf/archive/refs/tags/${VERSION}.tar.gz" \
                    -o build/swiftprotobuf.tar.gz
                  tar xzf build/swiftprotobuf.tar.gz -C build

                  SRC_DIR="$PWD/build/swift-protobuf-${VERSION}"

                  # Rename the SwiftPM library product and target before
                  # xcodebuild generates schemes. xcodebuild build setting
                  # overrides alone can leave the output named SwiftProtobuf.
                  perl -0pi -e 's/"SwiftProtobuf"/"EeveeSwiftProtobuf"/g' "$SRC_DIR/Package.swift"
                  perl -0pi -e 's/name: "EeveeSwiftProtobuf",\n            exclude:/name: "EeveeSwiftProtobuf",\n            path: "Sources\/SwiftProtobuf",\n            exclude:/' "$SRC_DIR/Package.swift"
                  perl -0pi -e 's/\.library\(\n            name: "EeveeSwiftProtobuf",\n            targets: \["EeveeSwiftProtobuf"\]/.library(\n            name: "EeveeSwiftProtobuf",\n            type: .dynamic,\n            targets: ["EeveeSwiftProtobuf"]/s' "$SRC_DIR/Package.swift"
                  grep -A4 -n 'name: "EeveeSwiftProtobuf"' "$SRC_DIR/Package.swift"

            - name: Build EeveeSwiftProtobuf.framework
              shell: bash
              run: |
                  set -euo pipefail

                  SRC_DIR="$PWD/build/swift-protobuf-${VERSION}"
                  DERIVED_DIR="$PWD/build/derived"

                  pushd "$SRC_DIR" >/dev/null
                  xcodebuild \
                    -scheme "$FRAMEWORK_NAME" \
                    -destination "generic/platform=iOS" \
                    -configuration Release \
                    -derivedDataPath "$DERIVED_DIR" \
                    -clonedSourcePackagesDirPath "$PWD/../pkgs" \
                    PRODUCT_NAME="$FRAMEWORK_NAME" \
                    PRODUCT_MODULE_NAME="$FRAMEWORK_NAME" \
                    PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
                    BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
                    CODE_SIGNING_ALLOWED=NO \
                    CODE_SIGNING_REQUIRED=NO \
                    LD_DYLIB_INSTALL_NAME="@rpath/${FRAMEWORK_NAME}.framework/${FRAMEWORK_NAME}" \
                    SKIP_INSTALL=NO \
                    INSTALL_PATH="/Library/Frameworks" \
                    ONLY_ACTIVE_ARCH=NO \
                    ARCHS="arm64 arm64e" \
                    -quiet \
                    2>&1 | awk '!/^(note:|warning:.*deprecated|$)/'
                  popd >/dev/null

                  BUILT_FRAMEWORK="$(find "$DERIVED_DIR" \
                    -name "${FRAMEWORK_NAME}.framework" \
                    -path "*/Release-iphoneos/*" \
                    | head -1)"

                  if [ -z "$BUILT_FRAMEWORK" ]; then
                    DYLIB="$(find "$DERIVED_DIR" \
                      \( -name "lib${FRAMEWORK_NAME}.dylib" -o -name "${FRAMEWORK_NAME}.dylib" \) \
                      | head -1)"
                    MODULE_DIR="$(find "$DERIVED_DIR" \
                      -type d -name "${FRAMEWORK_NAME}.swiftmodule" \
                      | head -1)"

                    if [ -z "$DYLIB" ] || [ -z "$MODULE_DIR" ]; then
                      echo "ERROR: ${FRAMEWORK_NAME}.framework was not emitted and fallback artifacts were not found." >&2
                      echo "Built frameworks:" >&2
                      find "$DERIVED_DIR" -name "*.framework" >&2 || true
                      echo "Built dylibs:" >&2
                      find "$DERIVED_DIR" -name "*.dylib" >&2 || true
                      echo "Built swiftmodules:" >&2
                      find "$DERIVED_DIR" -name "*.swiftmodule" >&2 || true
                      exit 1
                    fi

                    BUILT_FRAMEWORK="$PWD/build/${FRAMEWORK_NAME}.framework"
                    rm -rf "$BUILT_FRAMEWORK"
                    mkdir -p "$BUILT_FRAMEWORK/Modules/${FRAMEWORK_NAME}.swiftmodule"
                    cp "$DYLIB" "$BUILT_FRAMEWORK/$FRAMEWORK_NAME"
                    cp -R "$MODULE_DIR/"* "$BUILT_FRAMEWORK/Modules/${FRAMEWORK_NAME}.swiftmodule/"

                    if [ -f "$SRC_DIR/Sources/SwiftProtobuf/PrivacyInfo.xcprivacy" ]; then
                      cp "$SRC_DIR/Sources/SwiftProtobuf/PrivacyInfo.xcprivacy" "$BUILT_FRAMEWORK/"
                    fi

                    cat > "$BUILT_FRAMEWORK/Info.plist" <<EOF
                  <?xml version="1.0" encoding="UTF-8"?>
                  <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
                  <plist version="1.0">
                  <dict>
                    <key>CFBundleDevelopmentRegion</key>
                    <string>English</string>
                    <key>CFBundleExecutable</key>
                    <string>${FRAMEWORK_NAME}</string>
                    <key>CFBundleIdentifier</key>
                    <string>${BUNDLE_ID}</string>
                    <key>CFBundleInfoDictionaryVersion</key>
                    <string>6.0</string>
                    <key>CFBundleName</key>
                    <string>${FRAMEWORK_NAME}</string>
                    <key>CFBundlePackageType</key>
                    <string>FMWK</string>
                    <key>CFBundleShortVersionString</key>
                    <string>${VERSION}</string>
                    <key>CFBundleVersion</key>
                    <string>${VERSION}</string>
                  </dict>
                  </plist>
                  EOF

                    install_name_tool -id "@rpath/${FRAMEWORK_NAME}.framework/${FRAMEWORK_NAME}" "$BUILT_FRAMEWORK/$FRAMEWORK_NAME"
                  fi

                  mkdir -p artifacts/framework
                  cp -R "$BUILT_FRAMEWORK" "artifacts/framework/${FRAMEWORK_NAME}.framework"
                  FRAMEWORK="artifacts/framework/${FRAMEWORK_NAME}.framework"

                  if [ ! -d "$FRAMEWORK/Modules/${FRAMEWORK_NAME}.swiftmodule" ]; then
                    MODULE_DIR="$(find "$DERIVED_DIR" \
                      -type d -name "${FRAMEWORK_NAME}.swiftmodule" \
                      | head -1)"

                    if [ -z "$MODULE_DIR" ]; then
                      echo "ERROR: ${FRAMEWORK_NAME}.swiftmodule not found in framework or derived data." >&2
                      echo "Framework layout:" >&2
                      find "$FRAMEWORK" -maxdepth 4 -print >&2
                      echo "Derived swiftmodules:" >&2
                      find "$DERIVED_DIR" -name "*.swiftmodule" -print >&2 || true
                      exit 1
                    fi

                    mkdir -p "$FRAMEWORK/Modules/${FRAMEWORK_NAME}.swiftmodule"
                    cp -R "$MODULE_DIR/"* "$FRAMEWORK/Modules/${FRAMEWORK_NAME}.swiftmodule/"
                  fi

                  /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable ${FRAMEWORK_NAME}" "$FRAMEWORK/Info.plist" || \
                    /usr/libexec/PlistBuddy -c "Add :CFBundleExecutable string ${FRAMEWORK_NAME}" "$FRAMEWORK/Info.plist"
                  /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier ${BUNDLE_ID}" "$FRAMEWORK/Info.plist" || \
                    /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string ${BUNDLE_ID}" "$FRAMEWORK/Info.plist"
                  /usr/libexec/PlistBuddy -c "Set :CFBundleName ${FRAMEWORK_NAME}" "$FRAMEWORK/Info.plist" || \
                    /usr/libexec/PlistBuddy -c "Add :CFBundleName string ${FRAMEWORK_NAME}" "$FRAMEWORK/Info.plist"
                  /usr/libexec/PlistBuddy -c "Set :CFBundlePackageType FMWK" "$FRAMEWORK/Info.plist" || \
                    /usr/libexec/PlistBuddy -c "Add :CFBundlePackageType string FMWK" "$FRAMEWORK/Info.plist"
                  /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" "$FRAMEWORK/Info.plist" || \
                    /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string ${VERSION}" "$FRAMEWORK/Info.plist"
                  /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${VERSION}" "$FRAMEWORK/Info.plist" || \
                    /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string ${VERSION}" "$FRAMEWORK/Info.plist"

                  install_name_tool -id "@rpath/${FRAMEWORK_NAME}.framework/${FRAMEWORK_NAME}" "$FRAMEWORK/$FRAMEWORK_NAME"
                  ldid -S "$FRAMEWORK/$FRAMEWORK_NAME"

            - name: Validate framework
              shell: bash
              run: |
                  set -euo pipefail

                  FRAMEWORK="artifacts/framework/${FRAMEWORK_NAME}.framework"
                  echo "Framework layout:"
                  find "$FRAMEWORK" -maxdepth 4 -print

                  test -f "$FRAMEWORK/$FRAMEWORK_NAME"
                  test -d "$FRAMEWORK/Modules/${FRAMEWORK_NAME}.swiftmodule"

                  EXECUTABLE="$(plutil -extract CFBundleExecutable raw "$FRAMEWORK/Info.plist")"
                  IDENTIFIER="$(plutil -extract CFBundleIdentifier raw "$FRAMEWORK/Info.plist")"
                  echo "CFBundleExecutable=$EXECUTABLE"
                  echo "CFBundleIdentifier=$IDENTIFIER"
                  test "$EXECUTABLE" = "$FRAMEWORK_NAME"
                  test "$IDENTIFIER" = "$BUNDLE_ID"

                  INSTALL_NAME="$(otool -D "$FRAMEWORK/$FRAMEWORK_NAME" | tail -1)"
                  echo "$INSTALL_NAME"
                  test "$INSTALL_NAME" = "@rpath/${FRAMEWORK_NAME}.framework/${FRAMEWORK_NAME}"

                  LIPO_INFO="$(lipo -info "$FRAMEWORK/$FRAMEWORK_NAME")"
                  echo "$LIPO_INFO"
                  echo "$LIPO_INFO" | grep -F "arm64"
                  echo "$LIPO_INFO" | grep -F "arm64e"

                  mkdir -p artifacts/sideload
                  ditto -c -k --keepParent "$FRAMEWORK" "artifacts/sideload/${FRAMEWORK_NAME}.framework.zip"

            - name: Package DEBs
              shell: bash
              run: |
                  set -euo pipefail

                  mkdir -p packages

                  package_framework() {
                    local scheme="$1"
                    local architecture="$2"
                    local install_root="$3"
                    local package_root="build/package-$scheme"
                    local framework_dest="$package_root$install_root/Library/Frameworks/${FRAMEWORK_NAME}.framework"
                    local deb="packages/${PACKAGE_ID}_${VERSION}_${architecture}.deb"
                    local contents="packages/${scheme}-contents.txt"
                    local extract_root="build/extract-$scheme"
                    local extracted_framework="$extract_root$install_root/Library/Frameworks/${FRAMEWORK_NAME}.framework"

                    rm -rf "$package_root"
                    mkdir -p "$(dirname "$framework_dest")" "$package_root/DEBIAN"
                    cp -R "artifacts/framework/${FRAMEWORK_NAME}.framework" "$framework_dest"

                    {
                      printf 'Package: %s\n' "$PACKAGE_ID"
                      printf 'Name: %s\n' "$PACKAGE_NAME"
                      printf 'Version: %s\n' "$VERSION"
                      printf 'Architecture: %s\n' "$architecture"
                      printf 'Description: Plugin and runtime library for using protobuf with Swift\n'
                      printf 'Maintainer: eevee\n'
                      printf 'Author: eevee\n'
                      printf 'Section: System\n'
                      printf 'Tag: role::developer\n'
                    } > "$package_root/DEBIAN/control"

                    find "$package_root" -type d -exec chmod 755 {} \;
                    find "$package_root" -type f -exec chmod 644 {} \;
                    chmod 755 "$framework_dest/$FRAMEWORK_NAME"

                    dpkg-deb -Zxz -b "$package_root" "$deb"
                    dpkg-deb -c "$deb" | tee "$contents"
                    grep -F "${FRAMEWORK_NAME}.framework" "$contents"

                    rm -rf "$extract_root"
                    mkdir -p "$extract_root"
                    dpkg-deb -x "$deb" "$extract_root"
                    test -f "$extracted_framework/$FRAMEWORK_NAME"
                    test -d "$extracted_framework/Modules/${FRAMEWORK_NAME}.swiftmodule"
                    test "$(otool -D "$extracted_framework/$FRAMEWORK_NAME" | tail -1)" = "@rpath/${FRAMEWORK_NAME}.framework/${FRAMEWORK_NAME}"
                  }

                  package_framework rootful iphoneos-arm ""
                  package_framework rootless iphoneos-arm64 /var/jb
                  package_framework roothide iphoneos-arm64e /var/jb

            - name: Upload framework
              uses: actions/upload-artifact@v4
              with:
                  name: framework
                  path: artifacts/framework/${{ env.FRAMEWORK_NAME }}.framework
                  if-no-files-found: error

            - name: Upload sideload framework zip
              uses: actions/upload-artifact@v4
              with:
                  name: sideload-framework
                  path: artifacts/sideload/${{ env.FRAMEWORK_NAME }}.framework.zip
                  if-no-files-found: error

            - name: Upload DEBs
              uses: actions/upload-artifact@v4
              with:
                  name: packages
                  path: packages/*.deb
                  if-no-files-found: error

    release:
        needs: build
        runs-on: macos-15

        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        env:
            VERSION: 1.38.1
            FRAMEWORK_NAME: EeveeSwiftProtobuf
            PACKAGE_NAME: SwiftProtobuf

        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: all-artifacts

            - name: Prepare release files
              shell: bash
              run: |
                  set -euo pipefail

                  mkdir -p packages frameworks
                  cp all-artifacts/packages/*.deb packages/
                  cp all-artifacts/sideload-framework/*.zip frameworks/

            - name: Generate Checksums
              shell: bash
              run: |
                  set -euo pipefail

                  : > release_body.md

                  for pkg in packages/*_iphoneos-arm.deb; do
                    if [ -f "$pkg" ]; then
                      echo "### Rootful (iphoneos-arm)" >> release_body.md
                      echo "* MD5: $(md5 -q "$pkg")" >> release_body.md
                      echo "* SHA1: $(shasum -a 1 "$pkg" | awk '{ print $1 }')" >> release_body.md
                      echo "* SHA256: $(shasum -a 256 "$pkg" | awk '{ print $1 }')" >> release_body.md
                      echo "" >> release_body.md
                    fi
                  done

                  for pkg in packages/*_iphoneos-arm64.deb; do
                    if [ -f "$pkg" ]; then
                      echo "### Rootless (iphoneos-arm64)" >> release_body.md
                      echo "* MD5: $(md5 -q "$pkg")" >> release_body.md
                      echo "* SHA1: $(shasum -a 1 "$pkg" | awk '{ print $1 }')" >> release_body.md
                      echo "* SHA256: $(shasum -a 256 "$pkg" | awk '{ print $1 }')" >> release_body.md
                      echo "" >> release_body.md
                    fi
                  done

                  for pkg in packages/*_iphoneos-arm64e.deb; do
                    if [ -f "$pkg" ]; then
                      echo "### RootHide (iphoneos-arm64e)" >> release_body.md
                      echo "* MD5: $(md5 -q "$pkg")" >> release_body.md
                      echo "* SHA1: $(shasum -a 1 "$pkg" | awk '{ print $1 }')" >> release_body.md
                      echo "* SHA256: $(shasum -a 256 "$pkg" | awk '{ print $1 }')" >> release_body.md
                      echo "" >> release_body.md
                    fi
                  done

                  for framework in frameworks/*.zip; do
                    if [ -f "$framework" ]; then
                      echo "### $(basename "$framework")" >> release_body.md
                      echo "* MD5: $(md5 -q "$framework")" >> release_body.md
                      echo "* SHA1: $(shasum -a 1 "$framework" | awk '{ print $1 }')" >> release_body.md
                      echo "* SHA256: $(shasum -a 256 "$framework" | awk '{ print $1 }')" >> release_body.md
                      echo "" >> release_body.md
                    fi
                  done

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.VERSION }}
                  name: ${{ env.PACKAGE_NAME }} ${{ env.VERSION }}
                  body_path: release_body.md
                  files: |
                      packages/*.deb
                      frameworks/*.zip
                  fail_on_unmatched_files: true
                  draft: false
                  prerelease: false
                  make_latest: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Delete build artifacts
              uses: geekyeggo/delete-artifact@v5
              with:
                  name: |
                      packages
                      framework
                      sideload-framework
                  failOnError: false
